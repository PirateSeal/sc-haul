name: Terraform

on:
  push:
    branches: [master]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'

permissions:
  id-token: write   # Required for OIDC
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: infra/prod
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  terraform:
    name: Terraform Plan / Apply
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/prod

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📖
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Plan status check
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload plan artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/prod/tfplan
          retention-days: 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

      - name: Export TF outputs to GitHub variables
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CF_ID=$(terraform output -raw cloudfront_distribution_id)
          BUCKET=$(terraform output -raw site_bucket_id)
          gh variable set CF_DISTRIBUTION_ID --body "$CF_ID" --repo ${{ github.repository }}
          gh variable set SITE_BUCKET_ID --body "$BUCKET" --repo ${{ github.repository }}
